<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Qr - Ứng dụng Tạo mã QR Ngân hàng có sẵn số tiền</title>
    <meta
      name="description"
      content="Best Qr giúp bạn tạo mã QR ngân hàng có sẵn số tiền và nội dung chuyển khoản, mang lại sự tiện lợi và nhanh chóng cho mọi giao dịch."
    />
    <meta
      name="keywords"
      content="Best Qr, mã QR, chuyển tiền, ứng dụng ngân hàng, tạo mã QR kèm số tiền, lưu trữ mã QR, không cần internet"
    />
    <meta name="author" content="Softdy" />
    <meta name="theme-color" content="#317EFB" />
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon" />
    <link rel="manifest" href="/manifest.json" />
    <title>Best Qr</title>
    <script type="module" crossorigin src="/assets/index.f9fc36ea.js"></script>
    <link rel="modulepreload" href="/assets/react-venders.ae19ed18.js">
    <link rel="stylesheet" href="/assets/index-83d9de5c.css">
  </head>
  <body style="margin: 0">
    <div id="root"></div>
    
    <script>
      window.appVersion = '1.0.0'
      window.buildVersion = '3'

      let isUpdating = false
      const urlParams = new URLSearchParams(window.location.search)
      const isDebug = urlParams.get('debug')
      if (isDebug == 'true') {
        window.isDebug = true
      } else {
        window.isDebug = false
      }

      // Hàm để xử lý lỗi
      function handleError(event) {
        window.logError ? window.logError(event.message) : ''
        window.isDebug ? alert(event.message) : ''
      }

      // Lắng nghe tất cả các lỗi toàn cục
      window.addEventListener('error', handleError)

      // Lắng nghe lỗi trong Promise
      window.addEventListener('unhandledrejection', function (event) {
        if (event.reason instanceof Error) {
          window.logError
            ? window.logError(
                'Unhandled promise rejection: ' + event.reason.message,
                event.reason.stack,
              )
            : ''
          window.isDebug
            ? alert(
                'Unhandled promise rejection: ' +
                  event.reason.message +
                  event.reason.stack,
              )
            : ''
        } else {
          window.logError
            ? window.logError('Unhandled promise rejection: ' + event.reason)
            : ''
          window.isDebug
            ? alert('Unhandled promise rejection: ' + event.reason)
            : ''
        }
      })

      
      window.addEventListener('load', () => {
        function initWorker() {
        navigator.serviceWorker
              .register('/service-worker.js')
              .then((registration) => {
                console.log(
                  'Service Worker registered with scope:',
                  registration.scope,
                )
                registration.onupdatefound = () => {
                  const newWorker = registration.installing
                  newWorker.onstatechange = () => {
                    if (
                      newWorker.state === 'installed' &&
                      navigator.serviceWorker.controller
                    ) {
                      newWorker.postMessage({
                        action: 'removeOldCache',
                        host: window.location.href, // Truyền URL của trang hiện tại
                      })
                      newWorker.postMessage({ action: 'updateCache' })
                      if (!window.isUpdating) {
                        isUpdating = true // Đánh dấu đang cập nhật
                        // Nếu có bản cập nhật, yêu cầu cập nhật cache

                        newWorker.postMessage('skipWaiting') // Bỏ qua và sử dụng worker mới
                        setTimeout(() => {
                          location.reload() // Tải lại sau một thời gian
                        }, 5000) // Thay đổi khoảng thời gian nếu cần
                      }
                    }
                  }
                }

                document.addEventListener('visibilitychange', () => {
                  if (document.visibilityState === 'visible') {
                    // Khi trang quay lại foreground, kiểm tra và cập nhật Service Worker
                    console.log('Page is visible, checking for updates...')
                    registration.update() // Yêu cầu kiểm tra bản cập nhật của Service Worker
                  }
                })
              })
              .catch((error) => {
                window.logError ? window.logError(e.message, e.stack) : ''
                if (window.isDebug) {
                  alert(error.message)
                }
                console.error('Service Worker registration failed:', error)
              })
          }
    
      if (navigator.onLine) {
        setTimeout(function () {
          initWorker()
        }, 10000)
      } else {
        initWorker()
      }
    })

      
    </script>
  </body>
</html>
